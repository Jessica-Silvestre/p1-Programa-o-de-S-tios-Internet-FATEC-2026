<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Receitas </title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

  <header>

  <div class="hero">
    <img src="img/foto de fundo prato.png" class="hero-img">

    <div class="overlay">
      <h1>Localizador de Pratos</h1>
      <h2>(Location of Dishes)</h2>
    </div>
  </div>

  <div class="conteudo-header">
    <div class="busca-container">
      <input type="text" id="termoBusca" placeholder="Ex: Chicken, Beef, Pork, Sandwich, Dessert...">
      <button id="pesquisar">Pesquisar</button>

    </div>
    <p>Pesquise por pratos e encontre receitas deliciosas para o seu dia a dia</p>
  </div>

</header>

    <main id="galeria" class="galeria-grid">
        </main>

    
</body>
</html>
